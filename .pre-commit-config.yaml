repos:
  # Detect secrets using TruffleHog
  - repo: https://github.com/trufflesecurity/trufflesec-pre-commit-hooks
    rev: v1.4.0
    hooks:
      - id: trufflesec
        name: TruffleHog Secret Scanning
        entry: trufflehog filesystem .
        language: python
        types: [python]
        stages: [pre-commit]

  # Detect secrets using detect-secrets
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: ^(\.git|\.venv)

  # Prevent commits with large files
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: detect-private-key
        name: Detect Private Keys
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-json
      - id: check-yaml